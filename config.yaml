# Default configuration for speech classification experiments

# Dataset
data:
  root: './data'
  batch_size: 16
  num_workers: 4
  sample_rate: 16000
  max_length: 16000
  subset_fraction: 0.5  # fraction of training data to use (0.0, 1.0]; 1.0 = full dataset
  # Subset of class names to use. null = all 35 classes.
  # Example 10-class benchmark: [yes, no, up, down, left, right, on, off, go, stop]
  classes: [zero, one, two, three, four, five, six, seven, eight, nine]

# Model
model: 'lstm'  # lstm, transformer, s4
input_type: 'raw'  # raw, conv, mfcc

# Input preprocessing
conv_frontend:
  hidden_channels: [32, 64]
  kernel_size: 5
  stride: 2

mfcc:
  n_mfcc: 40

# LSTM config
lstm:
  hidden_dim: 128
  num_layers: 3
  bidirectional: true
  dropout: 0.3
  pooling: 'mean'

# Transformer config
transformer:
  d_model: 128
  nhead: 8
  num_layers: 4
  dim_feedforward: 512
  dropout: 0.1
  pooling: 'mean'

# S4 / S4D config
s4:
  ssm_type: 's4d'    # 's4d' (diagonal, NeurIPS 2022) or 's4' (NPLR/HiPPO-LegS, ICLR 2022)
  d_model: 128
  d_state: 64        # SSM state size N; ablate with 32 / 128 / 256
  num_layers: 4      # depth; ablate with 2 / 6
  dropout: 0.1
  pooling: 'mean'
  prenorm: true      # prenorm is recommended for S4-family models
  dt_min: 0.001      # min timescale ~1 ms  (covers fast phonetic events)
  dt_max: 0.1        # max timescale ~100 ms (covers word-level patterns)

# Training
training:
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.01
  seed: 42

# Logging
logging:
  log_dir: './logs'
  tensorboard_dir: './runs'
  print_freq: 10

# Device
device: 'cuda'  # cuda or cpu

# Weights & Biases experiment tracking
wandb:
  enabled: false
  project: 'speech-ssm'
  # Set experiment_id to a string to name a run or resume an interrupted one.
  # null = always start a fresh run with an auto-generated ID.
  experiment_id: null
